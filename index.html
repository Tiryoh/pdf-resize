<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Resize Tool</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <div class="header-text">
          <h1 data-i18n="title">PDF Resize Tool</h1>
          <p class="subtitle" data-i18n="subtitle">ブラウザで完結するPDF軽量化ツール</p>
        </div>
        <div class="lang-toggle">
          <button type="button" data-lang="ja" class="active">JA</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <div id="dropZone" class="drop-zone">
      <div class="drop-zone-content">
        <svg class="drop-icon" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 16V4m0 0L8 8m4-4l4 4"/>
          <path d="M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/>
        </svg>
        <p data-i18n="drop.prompt">PDFファイルをドラッグ＆ドロップ</p>
        <p class="drop-zone-hint" data-i18n="drop.hint">または クリックして選択</p>
      </div>
      <input type="file" id="fileInput" accept=".pdf" hidden>
    </div>

    <div id="fileInfo" class="file-info" hidden>
      <span id="fileName" class="file-name"></span>
      <span id="fileSize" class="file-size"></span>
    </div>

    <div class="preset-section">
      <div class="preset-label" data-i18n="preset.label">圧縮プリセット</div>
      <div class="preset-buttons">
        <button type="button" class="preset-btn" data-preset="light">
          <span class="preset-name" data-i18n="preset.light">軽量</span>
          <span class="preset-desc" data-i18n="preset.light.desc">高品質・最小圧縮</span>
        </button>
        <button type="button" class="preset-btn active" data-preset="standard">
          <span class="preset-name" data-i18n="preset.standard">標準</span>
          <span class="preset-desc" data-i18n="preset.standard.desc">バランス重視</span>
        </button>
        <button type="button" class="preset-btn" data-preset="maximum">
          <span class="preset-name" data-i18n="preset.maximum">最大圧縮</span>
          <span class="preset-desc" data-i18n="preset.maximum.desc">サイズ優先</span>
        </button>
      </div>
    </div>

    <details class="settings">
      <summary data-i18n="settings.title">詳細設定</summary>
      <div class="settings-grid">
        <div class="setting-item">
          <label for="jpegQuality" data-i18n="settings.jpegQuality">JPEG品質</label>
          <div class="slider-group">
            <input type="range" id="jpegQuality" min="0.1" max="1.0" step="0.05" value="0.75">
            <span id="jpegQualityValue" class="slider-value">75%</span>
          </div>
        </div>

        <div class="setting-item">
          <label for="maxDimension" data-i18n="settings.maxDimension">最大長辺 (px)</label>
          <input type="number" id="maxDimension" value="2048" min="256" max="8192" step="256">
        </div>

        <div class="setting-item">
          <label for="minPixelSize" data-i18n="settings.minPixelSize">最小画像サイズ (px)</label>
          <input type="number" id="minPixelSize" value="300" min="0" max="2000" step="50">
          <span class="setting-hint" data-i18n="settings.minPixelHint">各辺がこれ未満の画像はスキップ</span>
        </div>

        <div class="setting-item">
          <label for="minByteSize" data-i18n="settings.minByteSize">最小データサイズ (KB)</label>
          <input type="number" id="minByteSize" value="100" min="0" max="10000" step="10">
        </div>

        <div class="setting-item">
          <label data-i18n="settings.transparency">透過画像の処理</label>
          <div class="radio-group">
            <label><input type="radio" name="transparencyMode" value="compress" checked> <span data-i18n="settings.transparency.compress">個別圧縮</span></label>
            <label><input type="radio" name="transparencyMode" value="flatten"> <span data-i18n="settings.transparency.flatten">白背景で合成</span></label>
            <label><input type="radio" name="transparencyMode" value="skip"> <span data-i18n="settings.transparency.skip">スキップ</span></label>
          </div>
        </div>
      </div>
    </details>

    <button id="compressBtn" class="compress-btn" disabled data-i18n="btn.compress">圧縮開始</button>

    <div id="progressSection" class="progress-section" hidden>
      <div class="progress-bar-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <p id="progressText" class="progress-text" data-i18n="progress.preparing">準備中...</p>
    </div>

    <div id="resultSection" class="result-section" hidden>
      <div class="result-grid">
        <div class="result-item">
          <span class="result-label" data-i18n="result.originalSize">元サイズ</span>
          <span id="originalSize" class="result-value"></span>
        </div>
        <div class="result-item">
          <span class="result-label" data-i18n="result.compressedSize">圧縮後</span>
          <span id="compressedSize" class="result-value"></span>
        </div>
        <div class="result-item">
          <span class="result-label" data-i18n="result.reductionRate">削減率</span>
          <span id="reductionRate" class="result-value"></span>
        </div>
        <div class="result-item">
          <span class="result-label" data-i18n="result.imageStats">処理画像</span>
          <span id="imageStats" class="result-value"></span>
        </div>
        <div class="result-item">
          <span class="result-label" data-i18n="result.colorMode">カラーモード</span>
          <span id="colorMode" class="result-value"></span>
        </div>
      </div>
      <button id="downloadBtn" class="download-btn" data-i18n="btn.download">ダウンロード</button>
    </div>

    <footer>
      <p class="footer-repo">github.com/Tiryoh/pdf-resize</p>
      <p class="notice" data-i18n="footer.notice">Works offline — all processing runs locally in your browser.</p>
      <a href="https://github.com/Tiryoh/pdf-resize" target="_blank" rel="noopener noreferrer" class="github-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
          <path d="M9 18c-4.51 2-5-2-7-2"></path>
        </svg>
        <span data-i18n="footer.github">View source on GitHub</span>
      </a>
    </footer>
  </div>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/image-compressor.js"></script>
  <script src="js/pdf-processor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
